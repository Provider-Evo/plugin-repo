name: Generate plugin details

on:
  push:
    branches: [main]
    paths:
      - 'plugins.json'
      - '.github/workflows/generate-plugin-details.yml'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate plugins.json
        run: python -c "import json; json.load(open('plugins.json'))"
      - name: Placeholder generate step
        run: |
          if [ ! -f plugin_details.json ]; then echo '[]' > plugin_details.json; fi
          echo "Run provider-self/scripts/gen_plugin_details.py locally to refresh rich metadata"
